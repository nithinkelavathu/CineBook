version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mern_mongo
    ports:
      - '27018:27017'
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:alpine
    container_name: mern_redis
    ports:
      - '6379:6379'

  backend:
    build: ./backend
    container_name: mern_backend
    ports:
      - '5000:5000'
    environment:
      - MONGO_URI=mongodb://mongodb:27017/movietickets
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=testsecret123
      - STRIPE_SECRET_KEY=dummy
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    container_name: mern_frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  mongo-data:
